---
services:
  server:
    image: docker.gitea.com/gitea:1.26.4
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=mysql
      - GITEA__database__HOST=mariadb:3306
      - GITEA__database__NAME
      - GITEA__database__USER
      - GITEA__database__PASSWD
    restart: always
    networks:
      - proxy-network
    volumes:
      - $HOME/dockerVolumes/gitea/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
#    ports:
#      - "3000:3000"
#      - "222:22"
#    depends_on:
#      - db


networks:
  proxy-network:
    name: proxy-network
    external: true
