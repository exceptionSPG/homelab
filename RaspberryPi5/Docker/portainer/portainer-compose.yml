services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 9443:9443
      - 8000:8000  # Remove if you do not intend to use Edge Agents
    networks:
      - proxy-network

volumes:
  portainer_data:
    name: portainer_data

# create a shared network first
# docker network create proxy-network --driver bridge
networks: 
  proxy-network:
    external: true
    driver: bridge 
    name: proxy-network
