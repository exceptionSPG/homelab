---
- name: Create keyring directory
  ansible.builtin.file:
    path: "{{ apt_keyring_path }}" #/usr/share/keyrings
    state: directory
    mode: '0755'

- name: Download gpg key
  become: true
  ansible.builtin.get_url:
    url: "{{ tailscale_apt_signkey }}" #https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
    dest: "{{ tailscale_apt_keyring_path }}" #/usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Add tailscale repository
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ tailscale_apt_deb }}" # /usr/share/keyrings/tailscale-archive-keyring.gpg
    filename: "tailscale" #/etc/apt/sources.list.d/tailscale.list
    state: present
    codename: "{{ apt_codename }}"

- name: Install tailscale
  become: true
  ansible.builtin.apt:
    name: "{{ tailscale_package }}"
    cache_valid_time: 3600
    update_cache: yes
    state: "{{ state }}"
 
- name: Setup Tailscale with TS account
  ansible.builtin.include_tasks: setup.yml
