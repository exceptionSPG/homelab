---
# vars file for docker-pi

docker_apt_repo_url: "https://download.docker.com/linux/debian/gpg"
docker_apt_keyring_path: "/etc/apt/keyrings/docker.asc"
docker_sources_path: "/etc/apt/sources.list.d/docker.sources"
docker_apt_signkey: "https://download.docker.com/linux/debian/gpg"
docker_apt_uri: "https://download.docker.com/linux/debian"

docker_edition: 'ce'
docker_packages:
  - "docker-{{ docker_edition }}"
  - "docker-{{ docker_edition }}-cli"
  - "containerd.io"
  - "docker-buildx-plugin"
  - "docker-compose-plugin"

docker_obsolete_packages:
  - docker.io
  - docker-compose
  - docker-doc
  - podman-docker
  - containerd
  - runc

docker_dependency_packages:
  - ca-certificates
  - curl
  - python3-debian
